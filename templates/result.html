<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Result Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  </head>
  <body>
    <div class="background" aria-hidden="true">
      <span class="orb orb-one"></span>
      <span class="orb orb-two"></span>
      <span class="orb orb-three"></span>
    </div>

    <main class="dashboard-shell">
      <section class="dashboard-header">
        <div>
          <p class="eyebrow">Analysis complete</p>
          <h1>Result Dashboard</h1>
          <p class="subtitle">A polished breakdown of scores, accuracy, and question-by-question performance.</p>
          <p class="message-pill">{{ message }}</p>
        </div>
        <a class="btn btn-secondary" href="{{ url_for('index') }}">Analyze Another PDF</a>
      </section>

      <section class="stats-grid" id="stats-grid" aria-label="Performance summary"></section>

      <section class="panel">
        <div class="panel-header">
          <div>
            <p class="eyebrow">Detailed review</p>
            <h2>Question-wise breakdown</h2>
          </div>
          <div class="button-row">
            <button class="btn btn-secondary" id="download-csv" type="button">Download CSV Report</button>
            <button class="btn btn-primary" id="download-pdf" type="button">Download PDF Report</button>
          </div>
        </div>

        <div class="table-wrap">
          <table class="results-table">
            <thead>
              <tr>
                <th>Question Number</th>
                <th>Selected Option</th>
                <th>Correct Option</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="results-table-body"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
  </body>
</html>
